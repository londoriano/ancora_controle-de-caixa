<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1520"/>
      <stop offset="50%" style="stop-color:#0d2035"/>
      <stop offset="100%" style="stop-color:#071018"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#e8c97a;stop-opacity:0.05"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Glow center -->
  <ellipse cx="960" cy="540" rx="600" ry="400" fill="url(#glow)"/>

  <!-- Grid lines horizontal -->
  <g opacity="0.06" stroke="#c9a84c" stroke-width="1">
    <line x1="0" y1="108" x2="1920" y2="108"/>
    <line x1="0" y1="216" x2="1920" y2="216"/>
    <line x1="0" y1="324" x2="1920" y2="324"/>
    <line x1="0" y1="432" x2="1920" y2="432"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="648" x2="1920" y2="648"/>
    <line x1="0" y1="756" x2="1920" y2="756"/>
    <line x1="0" y1="864" x2="1920" y2="864"/>
    <line x1="0" y1="972" x2="1920" y2="972"/>
  </g>

  <!-- Grid lines vertical -->
  <g opacity="0.06" stroke="#c9a84c" stroke-width="1">
    <line x1="192" y1="0" x2="192" y2="1080"/>
    <line x1="384" y1="0" x2="384" y2="1080"/>
    <line x1="576" y1="0" x2="576" y2="1080"/>
    <line x1="768" y1="0" x2="768" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1152" y1="0" x2="1152" y2="1080"/>
    <line x1="1344" y1="0" x2="1344" y2="1080"/>
    <line x1="1536" y1="0" x2="1536" y2="1080"/>
    <line x1="1728" y1="0" x2="1728" y2="1080"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.08"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.06"/>
  <circle cx="1720" cy="880" r="200" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.08"/>
  <circle cx="1720" cy="880" r="130" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.06"/>

  <!-- Chart bars decoration (left bottom) -->
  <g opacity="0.12" fill="#c9a84c">
    <rect x="60" y="820" width="30" height="120" rx="4"/>
    <rect x="100" y="780" width="30" height="160" rx="4"/>
    <rect x="140" y="750" width="30" height="190" rx="4"/>
    <rect x="180" y="800" width="30" height="140" rx="4"/>
    <rect x="220" y="760" width="30" height="180" rx="4"/>
    <rect x="260" y="790" width="30" height="150" rx="4"/>
  </g>

  <!-- Chart bars decoration (right top) -->
  <g opacity="0.1" fill="#1a7be0">
    <rect x="1620" y="60" width="25" height="100" rx="3"/>
    <rect x="1655" y="40" width="25" height="120" rx="3"/>
    <rect x="1690" y="70" width="25" height="90" rx="3"/>
    <rect x="1725" y="30" width="25" height="130" rx="3"/>
    <rect x="1760" y="50" width="25" height="110" rx="3"/>
    <rect x="1795" y="45" width="25" height="115" rx="3"/>
    <rect x="1830" y="20" width="25" height="140" rx="3"/>
  </g>

  <!-- Anchor symbol large watermark -->
  <text x="960" y="600" font-size="400" text-anchor="middle" fill="#c9a84c" opacity="0.03" font-family="serif">⚓</text>

  <!-- Diagonal accent line -->
  <line x1="0" y1="1080" x2="1920" y2="0" stroke="#c9a84c" stroke-width="1" opacity="0.04"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1920" height="3" fill="url(#gold)" opacity="0.8"/>
  <!-- Bottom accent bar -->
  <rect x="0" y="1077" width="1920" height="3" fill="url(#gold)" opacity="0.8"/>

  <!-- Floating dots -->
  <g fill="#c9a84c">
    <circle cx="400" cy="300" r="2" opacity="0.2"/>
    <circle cx="700" cy="150" r="3" opacity="0.15"/>
    <circle cx="1200" cy="250" r="2" opacity="0.2"/>
    <circle cx="1500" cy="400" r="3" opacity="0.15"/>
    <circle cx="300" cy="700" r="2" opacity="0.2"/>
    <circle cx="1700" cy="600" r="2" opacity="0.2"/>
    <circle cx="850" cy="900" r="3" opacity="0.12"/>
    <circle cx="1100" cy="800" r="2" opacity="0.18"/>
  </g>
</svg>
